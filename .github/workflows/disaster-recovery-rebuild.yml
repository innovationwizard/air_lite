name: Disaster Recovery - Full Infrastructure Rebuild

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rebuild (dev/staging/prod)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      restore_data:
        description: 'Restore data from backups after infrastructure rebuild'
        required: true
        type: boolean
        default: true
      rds_snapshot_id:
        description: 'RDS snapshot identifier to restore from (leave empty for latest)'
        required: false
        type: string
      confirmation_code:
        description: 'Type REBUILD to confirm this destructive operation'
        required: true
        type: string

env:
  AWS_REGION: us-east-2
  CDK_DEFAULT_ACCOUNT: "200937443798"
  NODE_VERSION: "18"
  AWS_ROLE_ARN: arn:aws:iam::200937443798:role/AiRefillGitHubActionsRole

# Required for OIDC token exchange with AWS STS
permissions:
  id-token: write
  contents: read

jobs:
  # Pre-flight checks and validation
  validate-inputs:
    name: Validate Disaster Recovery Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation code
        run: |
          if [ "${{ github.event.inputs.confirmation_code }}" != "REBUILD" ]; then
            echo "❌ ERROR: Invalid confirmation code"
            echo "You must type REBUILD to confirm this disaster recovery operation"
            exit 1
          fi
          echo "✅ Confirmation code validated"

      - name: Log disaster recovery initiation
        run: |
          echo "🚨 DISASTER RECOVERY INITIATED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Restore Data: ${{ github.event.inputs.restore_data }}"
          echo "RDS Snapshot: ${{ github.event.inputs.rds_snapshot_id || 'Latest available' }}"
          echo "Initiated by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # Phase 1: Bootstrap AWS environment
  bootstrap-aws-environment:
    name: Phase 1 - Bootstrap AWS Environment
    runs-on: ubuntu-latest
    needs: validate-inputs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: infra_cdk/package-lock.json

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk@latest

      - name: Install CDK dependencies
        working-directory: infra_cdk
        run: npm ci

      - name: Bootstrap CDK (if needed)
        working-directory: infra_cdk
        run: |
          echo "🔧 Bootstrapping CDK environment..."
          cdk bootstrap aws://${{ env.CDK_DEFAULT_ACCOUNT }}/${{ env.AWS_REGION }} \
            --context environment=${{ github.event.inputs.environment }} \
            --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess \
            --qualifier airefill \
            --toolkit-stack-name CDKToolkit-airefill \
            || echo "⚠️ Bootstrap already exists or failed (continuing...)"

      - name: Verify AWS connectivity
        run: |
          echo "🔍 Verifying AWS connectivity..."
          aws sts get-caller-identity
          aws s3 ls || echo "⚠️ S3 access check (may fail if buckets don't exist yet)"

  # Phase 2: Deploy core infrastructure (VPC, Security, Storage)
  deploy-core-infrastructure:
    name: Phase 2 - Deploy Core Infrastructure
    runs-on: ubuntu-latest
    needs: bootstrap-aws-environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: infra_cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra_cdk
        run: npm ci

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk@latest

      - name: Deploy Base Stack (VPC & Networking)
        working-directory: infra_cdk
        run: |
          echo "🏗️  Deploying Base Stack (VPC)..."
          # Note: Base stack may be imported/pre-existing
          # If it needs to be created, uncomment below:
          # cdk deploy BaseStack \
          #   --context environment=${{ github.event.inputs.environment }} \
          #   --require-approval never \
          #   --outputs-file outputs/base-stack.json
          echo "⚠️ Base Stack (VPC) is imported - skipping deployment"
          echo "If VPC needs recreation, manually deploy with appropriate configuration"

      - name: Deploy Security Stack
        working-directory: infra_cdk
        run: |
          echo "🔐 Deploying Security Stack..."
          cdk deploy SecurityStack \
            --context environment=${{ github.event.inputs.environment }} \
            --require-approval never \
            --outputs-file outputs/security-stack.json

      - name: Deploy Storage Stack (S3 + KMS)
        working-directory: infra_cdk
        run: |
          echo "💾 Deploying Storage Stack..."
          cdk deploy StorageStack \
            --context environment=${{ github.event.inputs.environment }} \
            --require-approval never \
            --outputs-file outputs/storage-stack.json

      - name: Upload stack outputs
        uses: actions/upload-artifact@v4
        with:
          name: core-stack-outputs
          path: infra_cdk/outputs/
          retention-days: 7

  # Phase 3: Deploy data layer (RDS, ElastiCache)
  deploy-data-layer:
    name: Phase 3 - Deploy Data Layer
    runs-on: ubuntu-latest
    needs: deploy-core-infrastructure
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: infra_cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra_cdk
        run: npm ci

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk@latest

      - name: Create Secrets in AWS Secrets Manager
        run: |
          echo "🔑 Creating secrets in Secrets Manager..."

          # Generate secure random secrets if they don't exist
          aws secretsmanager create-secret \
            --name airefill/api/jwt-secret \
            --secret-string "$(openssl rand -base64 32)" \
            --description "JWT signing secret for AI Refill API" \
            || echo "Secret already exists"

          aws secretsmanager create-secret \
            --name airefill/api/refresh-secret \
            --secret-string "$(openssl rand -base64 32)" \
            --description "Refresh token secret for AI Refill API" \
            || echo "Secret already exists"

          aws secretsmanager create-secret \
            --name airefill/api/cookie-secret \
            --secret-string "$(openssl rand -base64 32)" \
            --description "Cookie secret for AI Refill API" \
            || echo "Secret already exists"

          # Database credentials (will be overwritten by RDS during creation)
          aws secretsmanager create-secret \
            --name airefill/dagster/db_credentials \
            --secret-string '{"username":"airefill_admin","password":"TEMPORARY_WILL_BE_REPLACED"}' \
            --description "Database credentials for AI Refill" \
            || echo "Secret already exists"

      - name: Deploy Database Stack
        working-directory: infra_cdk
        run: |
          echo "🗄️  Deploying Database Stack (Aurora PostgreSQL)..."
          if [ -n "${{ github.event.inputs.rds_snapshot_id }}" ]; then
            echo "📸 Restoring from snapshot: ${{ github.event.inputs.rds_snapshot_id }}"
            cdk deploy DatabaseStack \
              --context environment=${{ github.event.inputs.environment }} \
              --context snapshotId=${{ github.event.inputs.rds_snapshot_id }} \
              --require-approval never \
              --outputs-file outputs/database-stack.json
          else
            echo "🆕 Creating new database cluster"
            cdk deploy DatabaseStack \
              --context environment=${{ github.event.inputs.environment }} \
              --require-approval never \
              --outputs-file outputs/database-stack.json
          fi

      - name: Wait for RDS to become available
        run: |
          echo "⏳ Waiting for RDS cluster to become available..."
          CLUSTER_ID="infrastack-databaseb269d8bb-zozevzisykrf"

          MAX_ATTEMPTS=60
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(aws rds describe-db-clusters \
              --db-cluster-identifier $CLUSTER_ID \
              --query 'DBClusters[0].Status' \
              --output text 2>/dev/null || echo "not-found")

            if [ "$STATUS" = "available" ]; then
              echo "✅ RDS cluster is available"
              break
            elif [ "$STATUS" = "not-found" ]; then
              echo "⏳ Cluster not found yet, waiting... (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            else
              echo "⏳ RDS status: $STATUS (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 30
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ Timeout waiting for RDS cluster"
            exit 1
          fi

      - name: Deploy Cache Stack (ElastiCache)
        working-directory: infra_cdk
        run: |
          echo "⚡ Deploying Cache Stack (ElastiCache Redis)..."
          cdk deploy CacheStack \
            --context environment=${{ github.event.inputs.environment }} \
            --require-approval never \
            --outputs-file outputs/cache-stack.json

      - name: Upload stack outputs
        uses: actions/upload-artifact@v4
        with:
          name: data-layer-outputs
          path: infra_cdk/outputs/
          retention-days: 7

  # Phase 4: Deploy compute layer (ECS Cluster)
  deploy-compute-layer:
    name: Phase 4 - Deploy Compute Layer
    runs-on: ubuntu-latest
    needs: deploy-data-layer
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: infra_cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra_cdk
        run: npm ci

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk@latest

      - name: Deploy ECS Cluster Stack
        working-directory: infra_cdk
        run: |
          echo "🐳 Deploying ECS Cluster Stack..."
          cdk deploy EcsClusterStack \
            --context environment=${{ github.event.inputs.environment }} \
            --require-approval never \
            --outputs-file outputs/ecs-cluster-stack.json

      - name: Upload stack outputs
        uses: actions/upload-artifact@v4
        with:
          name: compute-layer-outputs
          path: infra_cdk/outputs/
          retention-days: 7

  # Phase 5: Build and push container images
  build-and-push-containers:
    name: Phase 5 - Build & Push Container Images
    runs-on: ubuntu-latest
    needs: deploy-compute-layer
    strategy:
      matrix:
        service: [api, frontend, dagster]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine build context and image name
        id: build-config
        run: |
          case "${{ matrix.service }}" in
            api)
              echo "context=./api-node" >> $GITHUB_OUTPUT
              echo "dockerfile=./api-node/Dockerfile" >> $GITHUB_OUTPUT
              echo "image_name=airefill-api" >> $GITHUB_OUTPUT
              ;;
            frontend)
              echo "context=./frontend" >> $GITHUB_OUTPUT
              echo "dockerfile=./frontend/Dockerfile" >> $GITHUB_OUTPUT
              echo "image_name=ai-refill-frontend" >> $GITHUB_OUTPUT
              ;;
            dagster)
              echo "context=./ml-pipeline" >> $GITHUB_OUTPUT
              echo "dockerfile=./ml-pipeline/Dockerfile" >> $GITHUB_OUTPUT
              echo "image_name=dagster-airefill" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ steps.build-config.outputs.image_name }} \
            || aws ecr create-repository \
              --repository-name ${{ steps.build-config.outputs.image_name }} \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.build-config.outputs.context }}
          file: ${{ steps.build-config.outputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.build-config.outputs.image_name }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.build-config.outputs.image_name }}:dr-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        run: |
          echo "🔍 Scanning ${{ steps.build-config.outputs.image_name }} for vulnerabilities..."
          aws ecr start-image-scan \
            --repository-name ${{ steps.build-config.outputs.image_name }} \
            --image-id imageTag=latest \
            || echo "⚠️ Image scan already in progress or failed"

  # Phase 6: Deploy application layer (ALB, API Service, Dagster, Frontend)
  deploy-application-layer:
    name: Phase 6 - Deploy Application Layer
    runs-on: ubuntu-latest
    needs: build-and-push-containers
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: infra_cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra_cdk
        run: npm ci

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk@latest

      - name: Deploy ALB Stack
        working-directory: infra_cdk
        run: |
          echo "⚖️  Deploying ALB Stack..."
          cdk deploy AlbStack \
            --context environment=${{ github.event.inputs.environment }} \
            --require-approval never \
            --outputs-file outputs/alb-stack.json

      - name: Deploy API Service Stack
        working-directory: infra_cdk
        run: |
          echo "🚀 Deploying API Service Stack..."
          cdk deploy ApiServiceStack \
            --context environment=${{ github.event.inputs.environment }} \
            --require-approval never \
            --outputs-file outputs/api-service-stack.json

      - name: Wait for API service to become healthy
        run: |
          echo "⏳ Waiting for API service to pass health checks..."

          MAX_ATTEMPTS=40
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HEALTHY_COUNT=$(aws ecs describe-services \
              --cluster airefill-api-cluster \
              --services airefill-api-service \
              --query 'services[0].deployments[?status==`PRIMARY`].runningCount' \
              --output text 2>/dev/null || echo "0")

            DESIRED_COUNT=$(aws ecs describe-services \
              --cluster airefill-api-cluster \
              --services airefill-api-service \
              --query 'services[0].desiredCount' \
              --output text 2>/dev/null || echo "0")

            if [ "$HEALTHY_COUNT" -ge "$DESIRED_COUNT" ] && [ "$DESIRED_COUNT" -gt 0 ]; then
              echo "✅ API service is healthy ($HEALTHY_COUNT/$DESIRED_COUNT tasks running)"
              break
            else
              echo "⏳ API service status: $HEALTHY_COUNT/$DESIRED_COUNT tasks running (attempt $ATTEMPT/$MAX_ATTEMPTS)"
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 30
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "⚠️ Warning: API service may not be fully healthy yet"
            echo "Check ECS console for details"
          fi

      - name: Deploy Dagster Task Stack
        working-directory: infra_cdk
        run: |
          echo "📊 Deploying Dagster Task Stack..."
          cdk deploy DagsterTaskStack \
            --context environment=${{ github.event.inputs.environment }} \
            --require-approval never \
            --outputs-file outputs/dagster-task-stack.json

      - name: Deploy Frontend Stack (App Runner)
        working-directory: infra_cdk
        run: |
          echo "🌐 Deploying Frontend Stack..."
          cdk deploy FrontendStack \
            --context environment=${{ github.event.inputs.environment }} \
            --require-approval never \
            --outputs-file outputs/frontend-stack.json

      - name: Upload stack outputs
        uses: actions/upload-artifact@v4
        with:
          name: application-layer-outputs
          path: infra_cdk/outputs/
          retention-days: 7

  # Phase 7: Deploy DNS and monitoring
  deploy-dns-and-monitoring:
    name: Phase 7 - Deploy DNS & Monitoring
    runs-on: ubuntu-latest
    needs: deploy-application-layer
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: infra_cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra_cdk
        run: npm ci

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk@latest

      - name: Deploy DNS Stack
        working-directory: infra_cdk
        run: |
          echo "🌍 Deploying DNS Stack..."
          cdk deploy DnsStack \
            --context environment=${{ github.event.inputs.environment }} \
            --require-approval never \
            --outputs-file outputs/dns-stack.json

      - name: Deploy Monitoring Stack
        working-directory: infra_cdk
        run: |
          echo "📈 Deploying Monitoring Stack..."
          cdk deploy MonitoringStack \
            --context environment=${{ github.event.inputs.environment }} \
            --require-approval never \
            --outputs-file outputs/monitoring-stack.json

      - name: Upload stack outputs
        uses: actions/upload-artifact@v4
        with:
          name: dns-monitoring-outputs
          path: infra_cdk/outputs/
          retention-days: 7

  # Phase 8: Restore data from backups
  restore-data:
    name: Phase 8 - Restore Data from Backups
    runs-on: ubuntu-latest
    needs: deploy-dns-and-monitoring
    if: github.event.inputs.restore_data == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore S3 data from backups
        run: |
          echo "📦 Restoring S3 data from backup bucket..."

          BACKUP_BUCKET="infrastack-mlopsartifactsbucket86136dad-49wrz4gasqrj"
          TARGET_BUCKETS=(
            "ai-refill-ml-artifacts"
            "infrastack-rawdatabucket57f26c03-umubjwuv9zzw"
          )

          for BUCKET in "${TARGET_BUCKETS[@]}"; do
            echo "Restoring to bucket: $BUCKET"

            # Check if bucket exists
            if aws s3 ls "s3://$BUCKET" 2>/dev/null; then
              # Sync from backup bucket if it exists
              aws s3 sync "s3://$BACKUP_BUCKET/$BUCKET/" "s3://$BUCKET/" \
                --storage-class INTELLIGENT_TIERING \
                || echo "⚠️ No backup found for $BUCKET or sync failed"
            else
              echo "⚠️ Target bucket $BUCKET does not exist yet"
            fi
          done

      - name: Verify RDS restoration
        run: |
          echo "🔍 Verifying RDS cluster restoration..."

          CLUSTER_ID="infrastack-databaseb269d8bb-zozevzisykrf"

          # Get cluster info
          aws rds describe-db-clusters \
            --db-cluster-identifier $CLUSTER_ID \
            --query 'DBClusters[0].[Status,Engine,EngineVersion,DatabaseName]' \
            --output table

          if [ -n "${{ github.event.inputs.rds_snapshot_id }}" ]; then
            echo "✅ Database restored from snapshot: ${{ github.event.inputs.rds_snapshot_id }}"
          else
            echo "ℹ️  New database created (no snapshot specified)"
            echo "⚠️  Manual data restoration may be required"
          fi

      - name: Run database migrations
        run: |
          echo "🔄 Running database migrations..."

          # Get database endpoint
          DB_ENDPOINT=$(aws rds describe-db-clusters \
            --db-cluster-identifier infrastack-databaseb269d8bb-zozevzisykrf \
            --query 'DBClusters[0].Endpoint' \
            --output text)

          echo "Database endpoint: $DB_ENDPOINT"

          # Note: Actual migration commands depend on your migration tool
          # Example using Prisma:
          # cd api-node
          # npx prisma migrate deploy

          echo "⚠️  Manual verification recommended:"
          echo "   1. Connect to database and verify schema"
          echo "   2. Run any pending migrations"
          echo "   3. Restore additional data if needed"

      - name: Restore ElastiCache data (if applicable)
        run: |
          echo "💾 ElastiCache Redis data restoration..."
          echo "ℹ️  Redis is typically used for caching, not persistent data"
          echo "ℹ️  Cache will warm up naturally as application runs"
          echo "✅ No action required for cache layer"

  # Phase 9: Verification and health checks
  verify-deployment:
    name: Phase 9 - Verify Deployment & Health Checks
    runs-on: ubuntu-latest
    needs: [deploy-dns-and-monitoring, restore-data]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Download all stack outputs
        uses: actions/download-artifact@v4
        with:
          path: stack-outputs

      - name: Run comprehensive health checks
        id: health-checks
        run: |
          echo "🏥 Running comprehensive health checks..."

          HEALTH_STATUS="HEALTHY"

          # Check 1: RDS Database
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "1. RDS Database Health"
          DB_STATUS=$(aws rds describe-db-clusters \
            --db-cluster-identifier infrastack-databaseb269d8bb-zozevzisykrf \
            --query 'DBClusters[0].Status' \
            --output text 2>/dev/null || echo "ERROR")

          if [ "$DB_STATUS" = "available" ]; then
            echo "✅ RDS: $DB_STATUS"
          else
            echo "❌ RDS: $DB_STATUS"
            HEALTH_STATUS="UNHEALTHY"
          fi

          # Check 2: ElastiCache
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "2. ElastiCache Health"
          CACHE_STATUS=$(aws elasticache describe-cache-clusters \
            --query 'CacheClusters[?contains(CacheClusterId, `airefill`)].CacheClusterStatus' \
            --output text 2>/dev/null || echo "ERROR")

          if [ -z "$CACHE_STATUS" ]; then
            echo "⚠️  ElastiCache: Not found or not deployed yet"
          elif [ "$CACHE_STATUS" = "available" ]; then
            echo "✅ ElastiCache: $CACHE_STATUS"
          else
            echo "❌ ElastiCache: $CACHE_STATUS"
            HEALTH_STATUS="UNHEALTHY"
          fi

          # Check 3: ECS Services
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "3. ECS Services Health"

          # API Service
          API_RUNNING=$(aws ecs describe-services \
            --cluster airefill-api-cluster \
            --services airefill-api-service \
            --query 'services[0].runningCount' \
            --output text 2>/dev/null || echo "0")

          API_DESIRED=$(aws ecs describe-services \
            --cluster airefill-api-cluster \
            --services airefill-api-service \
            --query 'services[0].desiredCount' \
            --output text 2>/dev/null || echo "0")

          if [ "$API_RUNNING" -ge "$API_DESIRED" ] && [ "$API_DESIRED" -gt 0 ]; then
            echo "✅ API Service: $API_RUNNING/$API_DESIRED tasks running"
          else
            echo "❌ API Service: $API_RUNNING/$API_DESIRED tasks running"
            HEALTH_STATUS="UNHEALTHY"
          fi

          # Check 4: ALB Target Health
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "4. ALB Target Health"

          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --query 'LoadBalancers[?contains(LoadBalancerName, `airefill`)].LoadBalancerArn' \
            --output text 2>/dev/null | head -1)

          if [ -n "$ALB_ARN" ]; then
            TG_ARNS=$(aws elbv2 describe-target-groups \
              --load-balancer-arn "$ALB_ARN" \
              --query 'TargetGroups[].TargetGroupArn' \
              --output text 2>/dev/null)

            for TG_ARN in $TG_ARNS; do
              HEALTHY_TARGETS=$(aws elbv2 describe-target-health \
                --target-group-arn "$TG_ARN" \
                --query 'length(TargetHealthDescriptions[?TargetHealth.State==`healthy`])' \
                --output text 2>/dev/null || echo "0")

              TOTAL_TARGETS=$(aws elbv2 describe-target-health \
                --target-group-arn "$TG_ARN" \
                --query 'length(TargetHealthDescriptions)' \
                --output text 2>/dev/null || echo "0")

              if [ "$HEALTHY_TARGETS" -gt 0 ]; then
                echo "✅ Target Group: $HEALTHY_TARGETS/$TOTAL_TARGETS targets healthy"
              else
                echo "⚠️  Target Group: $HEALTHY_TARGETS/$TOTAL_TARGETS targets healthy"
              fi
            done
          else
            echo "⚠️  ALB not found"
          fi

          # Check 5: App Runner (Frontend)
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "5. App Runner Frontend Health"

          APP_RUNNER_STATUS=$(aws apprunner list-services \
            --query 'ServiceSummaryList[?contains(ServiceName, `frontend`)].Status' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$APP_RUNNER_STATUS" = "RUNNING" ]; then
            echo "✅ App Runner: $APP_RUNNER_STATUS"
          else
            echo "⚠️  App Runner: $APP_RUNNER_STATUS"
          fi

          # Check 6: API Endpoint Test
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "6. API Endpoint Test"

          API_URL="https://api.airefill.app/health"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL" || echo "000")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ API Health Check: HTTP $HTTP_STATUS"
          else
            echo "❌ API Health Check: HTTP $HTTP_STATUS"
            echo "   URL: $API_URL"
            HEALTH_STATUS="UNHEALTHY"
          fi

          # Final status
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "OVERALL HEALTH: $HEALTH_STATUS"
          echo "health_status=$HEALTH_STATUS" >> $GITHUB_OUTPUT

      - name: Generate deployment report
        run: |
          echo "📊 DISASTER RECOVERY DEPLOYMENT REPORT" > dr-report.md
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> dr-report.md
          echo "" >> dr-report.md
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> dr-report.md
          echo "**Initiated by:** ${{ github.actor }}" >> dr-report.md
          echo "**Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> dr-report.md
          echo "**Health Status:** ${{ steps.health-checks.outputs.health_status }}" >> dr-report.md
          echo "" >> dr-report.md
          echo "## Infrastructure Components" >> dr-report.md
          echo "" >> dr-report.md
          echo "- ✅ VPC & Networking" >> dr-report.md
          echo "- ✅ Security Groups & IAM Roles" >> dr-report.md
          echo "- ✅ S3 Buckets & KMS Keys" >> dr-report.md
          echo "- ✅ RDS Aurora PostgreSQL" >> dr-report.md
          echo "- ✅ ElastiCache Redis" >> dr-report.md
          echo "- ✅ ECS Cluster & Services" >> dr-report.md
          echo "- ✅ Application Load Balancer" >> dr-report.md
          echo "- ✅ App Runner (Frontend)" >> dr-report.md
          echo "- ✅ Route 53 DNS" >> dr-report.md
          echo "- ✅ CloudWatch Monitoring" >> dr-report.md
          echo "" >> dr-report.md
          echo "## Deployed Services" >> dr-report.md
          echo "" >> dr-report.md

          # List all deployed CDK stacks
          aws cloudformation list-stacks \
            --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE \
            --query 'StackSummaries[?contains(StackName, `airefill`) || contains(StackName, `infrastack`)].{Name:StackName,Status:StackStatus,Created:CreationTime}' \
            --output table >> dr-report.md

          echo "" >> dr-report.md
          echo "## Next Steps" >> dr-report.md
          echo "" >> dr-report.md
          echo "1. Verify application functionality" >> dr-report.md
          echo "2. Test user authentication and API endpoints" >> dr-report.md
          echo "3. Validate data integrity in database" >> dr-report.md
          echo "4. Run smoke tests on critical workflows" >> dr-report.md
          echo "5. Monitor CloudWatch dashboards for anomalies" >> dr-report.md
          echo "6. Update DNS records if needed" >> dr-report.md
          echo "7. Notify stakeholders of recovery completion" >> dr-report.md

          cat dr-report.md

      - name: Upload deployment report
        uses: actions/upload-artifact@v4
        with:
          name: disaster-recovery-report
          path: dr-report.md
          retention-days: 90

      - name: Send completion notification
        if: always()
        run: |
          if [ "${{ steps.health-checks.outputs.health_status }}" = "HEALTHY" ]; then
            echo "✅ DISASTER RECOVERY COMPLETED SUCCESSFULLY"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "All infrastructure components have been rebuilt and verified."
            echo ""
            echo "🌐 Application URLs:"
            echo "   • API: https://api.airefill.app"
            echo "   • Frontend: https://airefill.app"
            echo ""
            echo "📊 CloudWatch Dashboard:"
            echo "   • https://console.aws.amazon.com/cloudwatch/home?region=${{ env.AWS_REGION }}#dashboards:name=airefill-monitoring-overview"
            echo ""
            echo "📝 Review the deployment report artifact for details."
          else
            echo "⚠️  DISASTER RECOVERY COMPLETED WITH WARNINGS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Infrastructure has been deployed but some health checks failed."
            echo "Manual intervention may be required."
            echo ""
            echo "Check the deployment report and CloudWatch logs for details."
          fi

  # Phase 10: Post-deployment tasks
  post-deployment-tasks:
    name: Phase 10 - Post-Deployment Configuration
    runs-on: ubuntu-latest
    needs: verify-deployment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Warm up caches
        run: |
          echo "♨️  Warming up ElastiCache..."

          # Make requests to common API endpoints to populate cache
          API_URLS=(
            "https://api.airefill.app/health"
            "https://api.airefill.app/api/dashboards"
          )

          for URL in "${API_URLS[@]}"; do
            echo "Requesting: $URL"
            curl -s "$URL" > /dev/null || echo "⚠️ Cache warm-up request failed for $URL"
          done

          echo "✅ Cache warm-up completed"

      - name: Trigger initial Dagster pipeline run
        run: |
          echo "🔄 Triggering initial Dagster pipeline..."

          # Get Dagster ECS task definition
          TASK_DEF=$(aws ecs list-task-definitions \
            --family-prefix dagster \
            --sort DESC \
            --max-items 1 \
            --query 'taskDefinitionArns[0]' \
            --output text)

          if [ -n "$TASK_DEF" ]; then
            echo "Running task: $TASK_DEF"

            # Run task manually (instead of waiting for schedule)
            aws ecs run-task \
              --cluster airefill-api-cluster \
              --task-definition "$TASK_DEF" \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[subnet-0980f1831e02ca8eb,subnet-0b30e605818526676],securityGroups=[sg-0a8f8fa3715bfcda3],assignPublicIp=DISABLED}" \
              || echo "⚠️ Failed to trigger Dagster pipeline"

            echo "ℹ️  Dagster pipeline triggered (runs asynchronously)"
          else
            echo "⚠️ Dagster task definition not found"
          fi

      - name: Configure CloudWatch alarms
        run: |
          echo "🔔 Verifying CloudWatch alarms..."

          ALARM_COUNT=$(aws cloudwatch describe-alarms \
            --alarm-name-prefix "airefill" \
            --query 'length(MetricAlarms)' \
            --output text)

          echo "Found $ALARM_COUNT CloudWatch alarms"

          if [ "$ALARM_COUNT" -gt 0 ]; then
            echo "✅ CloudWatch alarms configured"
          else
            echo "⚠️  No CloudWatch alarms found - verify monitoring stack"
          fi

      - name: Final instructions
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 DISASTER RECOVERY WORKFLOW COMPLETED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📋 REQUIRED MANUAL STEPS:"
          echo ""
          echo "1. DATABASE VERIFICATION"
          echo "   • Connect to RDS and verify schema"
          echo "   • Run data integrity checks"
          echo "   • Verify row counts match expectations"
          echo ""
          echo "2. APPLICATION TESTING"
          echo "   • Test user login and authentication"
          echo "   • Verify dashboard data loads correctly"
          echo "   • Test API endpoints thoroughly"
          echo "   • Validate ML pipeline execution"
          echo ""
          echo "3. DATA VALIDATION"
          echo "   • Verify S3 data restoration"
          echo "   • Check ML model artifacts"
          echo "   • Validate configuration files"
          echo ""
          echo "4. MONITORING SETUP"
          echo "   • Verify CloudWatch dashboards"
          echo "   • Test SNS alarm notifications"
          echo "   • Set up on-call rotations"
          echo ""
          echo "5. DOCUMENTATION"
          echo "   • Update DR runbook with lessons learned"
          echo "   • Document any manual steps taken"
          echo "   • Update RTO/RPO metrics"
          echo ""
          echo "6. STAKEHOLDER NOTIFICATION"
          echo "   • Notify team of recovery completion"
          echo "   • Schedule post-incident review"
          echo "   • Update status page"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "⏱️  Total Recovery Time: $(($(date +%s) - ${{ github.event.workflow_run.created_at }}))"
          echo "📊 Health Status: Check the deployment report artifact"
          echo ""
          echo "🔗 Useful Links:"
          echo "   • AWS Console: https://console.aws.amazon.com/console/home?region=${{ env.AWS_REGION }}"
          echo "   • CloudWatch: https://console.aws.amazon.com/cloudwatch/home?region=${{ env.AWS_REGION }}"
          echo "   • ECS Clusters: https://console.aws.amazon.com/ecs/home?region=${{ env.AWS_REGION }}#/clusters"
          echo "   • RDS Databases: https://console.aws.amazon.com/rds/home?region=${{ env.AWS_REGION }}"
